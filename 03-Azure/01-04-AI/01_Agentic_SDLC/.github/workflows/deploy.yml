# =============================================================================
# deploy.yml — Challenge 5 starter workflow (OPTIONAL, SKELETON — not turnkey)
# -----------------------------------------------------------------------------
# This is a TODO-marked scaffold, NOT a working deploy. It is inert by default:
#   - the `push` trigger is commented out, so it never auto-runs, and
#   - no secrets are configured, so `azure/login` would no-op until you set them.
#
# Your job (the interesting part): finish the # TODO steps with Copilot, wire up
# OIDC, and get a green, reachable deploy. See infra/README.md for the topology.
#
# ----- OIDC setup (no client secret is ever stored) --------------------------
# 1. Create a user-assigned managed identity OR an app registration in Azure.
# 2. Grant it Contributor on the target resource group (or subscription scope).
# 3. Add a FEDERATED CREDENTIAL on it whose subject matches how this workflow
#    runs, e.g. for the main branch:
#        repo:<owner>/<repo>:ref:refs/heads/main
#    (or `repo:<owner>/<repo>:environment:<env>` if you gate on an environment).
# 4. Add these GitHub secrets — Settings > Secrets and variables > Actions:
#        AZURE_CLIENT_ID         (the identity/app client id)
#        AZURE_TENANT_ID
#        AZURE_SUBSCRIPTION_ID
#    and these repo/environment VARIABLES:
#        AZURE_RESOURCE_GROUP    (e.g. octocat-hack-rg)
#        AZURE_LOCATION          (e.g. eastus)
# No AZURE_CREDENTIALS / client secret is used — auth is OIDC only.
# =============================================================================

name: Deploy to Azure (Challenge 5 — scaffold)

on:
  workflow_dispatch:
  # TODO: Opt in to automatic deploys once the workflow is finished and you trust
  #       it. Kept commented out so this scaffold never runs destructively.
  # push:
  #   branches: [ main ]

# OIDC: `id-token: write` lets the job request a short-lived federated token that
# azure/login exchanges for Azure creds. `contents: read` is for checkout.
permissions:
  id-token: write
  contents: read

env:
  # Pulled from the GitHub secrets/variables described in the header comment.
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  LOCATION: ${{ vars.AZURE_LOCATION }}
  # TODO: Registry + image naming. Set the ACR name your Bicep produces (it is
  #       derived as <namePrefix><environmentName>acr) or read it from an output.
  ACR_NAME: '' # TODO: e.g. octocatdevacr
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: Provision & deploy
    runs-on: ubuntu-latest
    # TODO: Consider binding to a GitHub Environment (e.g. `environment: dev`) so
    #       you can add reviewers/approval gates and environment-scoped secrets.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OIDC login — note there is NO `creds:` input and no client secret.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

